<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本語 Flash Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <div id="app">
    <header>
      <div class="logo">
        <span class="logo-jp">日本語</span>
        <span class="logo-en">flash cards</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </header>

    <!-- Home Screen -->
    <main id="home-screen" class="screen active">
      <p class="home-subtitle">Choose a category to begin</p>
      <div id="category-list"></div>
    </main>

    <!-- Quiz Screen -->
    <main id="quiz-screen" class="screen">
      <div class="quiz-header">
        <button id="back-btn" aria-label="Back to categories">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        </button>
        <span id="quiz-category-name" class="quiz-category-name"></span>
        <span id="question-counter"></span>
      </div>
      <div id="progress-dots" class="progress-dots"></div>
      <div id="question-card" class="card">
        <div class="prompt" id="question-prompt"></div>
        <button type="button" id="hint-reveal" class="hint-reveal">show hint</button>
        <div class="hint" id="question-hint"></div>
        <form id="answer-form">
          <div class="input-row">
            <input
              type="text"
              id="answer-input"
              placeholder="ひらがな or romaji"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            >
            <button type="submit" id="submit-btn" class="btn btn-primary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </form>
        <div id="feedback" class="feedback hidden">
          <span id="feedback-icon"></span>
          <span id="feedback-text"></span>
          <div id="correct-answer" class="correct-answer"></div>
        </div>
        <button id="next-btn" class="btn btn-next hidden">
          Next
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </main>

    <!-- Results Screen -->
    <main id="results-screen" class="screen">
      <div class="card results-card">
        <h2 id="results-message"></h2>
        <div class="score-display">
          <svg class="score-ring" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="52" />
            <circle id="score-ring-fill" class="score-ring-fill" cx="60" cy="60" r="52" />
          </svg>
          <div class="score-text">
            <span id="score-number">0</span>
            <span class="score-label">/ <span id="score-total">0</span></span>
          </div>
        </div>
        <div id="results-list" class="results-list"></div>
        <div class="results-actions">
          <button id="retry-btn" class="btn btn-primary">Try Again</button>
          <button id="home-btn" class="btn btn-ghost">All Categories</button>
        </div>
      </div>
    </main>
  </div>

  <script src="data/quizzes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
